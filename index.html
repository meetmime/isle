<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'PingFang SC', serif; overflow: hidden; cursor: pointer; background: #000; }
        
        /* 🏝️ 优化的海岛背景图 */
        #bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center;
            background-size: cover; z-index: -2; transition: transform 15s ease-in-out;
        }

        /* 💡 关键：毛玻璃层，提升文字可读性 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(2px); z-index: -1;
        }

        #start-screen { font-size: 22px; letter-spacing: 10px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); transition: opacity 1.5s ease; position: absolute; z-index: 10; }

        .breathing-orb { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 12%; }
        .animate-breathe { animation: breathe 10s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(0.9); opacity: 0.3; } }

        #chat-history { 
            width: 85%; max-width: 500px; height: 50vh; 
            margin-top: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; top: 10%; padding: 20px;
        }

        .message { font-size: 16px; line-height: 1.8; color: #1a1a1a; text-shadow: 0 1px 5px rgba(255,255,255,0.8); animation: fadeIn 0.8s ease forwards; }
        .user-msg { text-align: right; color: #444; font-style: italic; margin-left: 15%; }
        .ai-msg { text-align: left; border-left: 3px solid rgba(0,0,0,0.3); padding-left: 15px; margin-right: 15%; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-box { 
            margin-top: 400px; width: 320px; 
            display: flex; align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.5); padding-bottom: 8px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; pointer-events: none;
        }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; color: #000; }
        .chat-box button { background: transparent; border: none; color: #000; cursor: pointer; font-size: 14px; font-weight: 600; letter-spacing: 2px; }

        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="startJourney()">

    <audio id="bgm" loop preload="auto">
        <source src="https://raw.githubusercontent.com/rafaelrinaldi/ocean-waves/master/ocean-waves.mp3" type="audio/mpeg">
    </audio>
    
    <div id="bg"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 12px; letter-spacing: 4px; margin-top: 15px;">轻触屏幕 听海入心</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">欢迎来到 Isle。此刻，听着海浪声，你想对潜意识里的自己说些什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="诉说..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 
        let hasStarted = false; 
        let chatContext = []; 

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            
            const audio = document.getElementById("bgm");
            audio.play().catch(e => console.log("Audio play blocked"));
            
            document.getElementById("start-screen").style.opacity = 0;
            document.getElementById("bg").style.transform = "scale(1.1)";
            
            setTimeout(() => { 
                let orb = document.getElementById("orb");
                orb.style.opacity = 1; 
                orb.classList.add("animate-breathe"); 
            }, 1000);
            
            setTimeout(() => { 
                document.getElementById("chat-history").style.opacity = 1; 
                document.getElementById("first-greeting").style.opacity = 1; 
            }, 3000);
            setTimeout(() => { 
                document.getElementById("chat-input-container").classList.add("visible"); 
            }, 5000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chatHistoryContainer = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            chatHistoryContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            btn.innerText = "..."; btn.disabled = true;
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;

            chatContext.push({ role: "user", parts: [{ text: text }] });

            const sysPrompt = "你是一个名为Isle的资深心理咨询师。精通荣格和阿德勒。语气温暖、极简。请结合心理学深度视角回复，必须联系上下文，字数控制在60字内，并以一个深入灵魂的反问结束。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatContext,
                        systemInstruction: { parts: [{ text: sysPrompt }] }
                    })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    chatHistoryContainer.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                }

            } catch (error) {
                chatHistoryContainer.innerHTML += `<div class="message ai-msg">正如荣格所言，不曾觉醒的潜意识会成为命运。你感觉这股情绪在试图提醒你什么？</div>`;
            }

            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
