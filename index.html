<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Georgia', serif; color: #5C5853; overflow: hidden; cursor: pointer; }
        
        /* 🏝️ 极简海岛背景图 - 选用了淡雅的意境图 */
        #background-scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1505144808405-9c5d0f81d897?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.9) saturate(0.8);
            z-index: -2;
            transition: transform 10s ease-in-out;
        }

        /* 阴影遮罩，增加文字可读性 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 241, 236, 0.3);
            z-index: -1;
        }

        #start-screen { font-size: 18px; letter-spacing: 6px; transition: opacity 2s ease; position: absolute; text-align: center; color: #4A4A4A; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .breathing-orb { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 12%; }
        .animate-breathe { animation: breathe 12s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(0.9); opacity: 0.3; } }

        #chat-history { 
            width: 85%; max-width: 450px; height: 55vh; 
            margin-top: 40px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; top: 5%; padding: 15px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .message { font-size: 15px; line-height: 1.8; letter-spacing: 1px; animation: fadeIn 1s ease forwards; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .user-msg { text-align: right; color: #5D574F; font-weight: 500; margin-left: 15%; }
        .ai-msg { text-align: left; color: #3A3A3A; margin-right: 15%; border-left: 2px solid #8C857D; padding-left: 15px; backdrop-filter: blur(2px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-box { 
            margin-top: 420px; width: 320px; 
            display: flex; align-items: center; 
            border-bottom: 1.5px solid #8C857D; padding-bottom: 10px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; pointer-events: none;
        }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-family: 'Georgia', serif; color: #2A2A2A; font-size: 16px; }
        .chat-box button { background: transparent; border: none; color: #4A4A4A; cursor: pointer; font-size: 14px; letter-spacing: 2px; font-weight: bold; }

        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="startJourney()">

    <audio id="bgm" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/water/ocean_waves.ogg" type="audio/ogg">
    </audio>
    
    <div id="background-scene"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 12px; margin-top: 15px;">[ 听海，向内看 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">在这个远离喧嚣的海岛，此刻你的内心回响着什么样的声音？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="将思绪交给大海..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 
        let hasStarted = false; 
        let chatContext = []; // 修复点：更严谨的对话历史管理

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            
            document.getElementById("bgm").play();
            document.getElementById("start-screen").style.opacity = 0;
            // 背景轻微放大效果，模拟岛屿漂浮
            document.getElementById("background-scene").style.transform = "scale(1.1)";
            
            setTimeout(() => { 
                let orb = document.getElementById("orb");
                orb.style.opacity = 1; 
                orb.classList.add("animate-breathe"); 
            }, 1000);
            
            setTimeout(() => { 
                document.getElementById("chat-history").style.opacity = 1; 
                document.getElementById("first-greeting").style.opacity = 1; 
            }, 4000);
            setTimeout(() => { 
                document.getElementById("chat-input-container").classList.add("visible"); 
            }, 6000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chatHistoryContainer = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            // 1. 更新界面展示
            chatHistoryContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            btn.innerText = "..."; btn.disabled = true;
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;

            // 2. 构造符合 Gemini 1.5 Pro 规范的历史格式
            chatContext.push({ role: "user", parts: [{ text: text }] });

            const systemPrompt = "你是一个名为Isle的顶级心理咨询师，深度掌握阿德勒、荣格书籍内容。请针对用户最新的话，给出富有洞察力的回复。要求：1. 温暖且智慧。2. 绝对不要重复之前说过的话。3. 字数60字内。4. 必须以一个深入灵魂的问题结束。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatContext,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    
                    // 3. 将回复存入历史，形成闭环
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    
                    chatHistoryContainer.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                } else {
                    throw new Error("格式错误");
                }

            } catch (error) {
                console.error(error);
                chatHistoryContainer.innerHTML += `<div class="message ai-msg">海浪卷走了回声。这种无法表达的感觉，是否正触碰到了你内心某个柔软的角落？</div>`;
            }

            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
