<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'PingFang SC', serif; overflow: hidden; cursor: pointer; background: #000; }
        #bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center; background-size: cover; z-index: -2; transition: transform 15s ease-out; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(1.5px); z-index: -1; }
        #start-screen { font-size: 22px; letter-spacing: 12px; color: white; transition: opacity 1.5s ease; position: absolute; z-index: 10; text-align: center; font-weight: 300; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .breathing-orb { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 12%; }
        .animate-breathe { animation: breathe 12s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(0.9); opacity: 0.3; } }
        #chat-history { width: 85%; max-width: 450px; height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 2s ease; position: absolute; top: 10%; padding: 20px; }
        .message { font-size: 16px; line-height: 1.9; color: white; text-shadow: 0 1px 5px rgba(0,0,0,0.8); animation: fadeIn 0.8s ease forwards; }
        .user-msg { text-align: right; color: rgba(255,255,255,0.8); font-style: italic; margin-left: 15%; }
        .ai-msg { text-align: left; border-left: 2px solid rgba(255,255,255,0.6); padding-left: 15px; margin-right: 15%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-box { margin-top: 400px; width: 320px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.7); padding-bottom: 8px; opacity: 0; transition: opacity 2s ease; position: absolute; pointer-events: none; }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; color: white; }
        .chat-box button { background: transparent; border: none; color: white; cursor: pointer; font-size: 14px; font-weight: 600; letter-spacing: 2px; }
        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="startJourney()">

    <div id="bg"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 11px; margin-top: 15px; letter-spacing: 4px;">[ 轻触屏幕 唤醒海岛 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">欢迎来到 Isle。听着浪声，此刻你脑海中浮现出的第一个词是什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="诉说..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 
        let hasStarted = false; 
        let chatContext = []; 
        let audioCtx;

        // 🌊 数学生成海浪：白噪声 + 低通滤波 + 增益波动
        function playOceanSound() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioCtx.sampleRate,
                  buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                  output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 400;

            const gain = audioCtx.createGain();
            gain.gain.value = 0.1;

            // 模拟潮汐
            function tide() {
                const now = audioCtx.currentTime;
                gain.gain.exponentialRampToValueAtTime(0.2, now + 4);
                gain.gain.exponentialRampToValueAtTime(0.05, now + 8);
                setTimeout(tide, 8000);
            }

            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); tide();
        }

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            playOceanSound();
            document.getElementById("start-screen").style.opacity = 0;
            document.getElementById("bg").style.transform = "scale(1.1)";
            setTimeout(() => { document.getElementById("orb").style.opacity = 1; document.getElementById("orb").classList.add("animate-breathe"); }, 1000);
            setTimeout(() => { document.getElementById("chat-history").style.opacity = 1; document.getElementById("first-greeting").style.opacity = 1; }, 3000);
            setTimeout(() => { document.getElementById("chat-input-container").classList.add("visible"); }, 5000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;
            const chatHistoryContainer = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            chatHistoryContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = ""; btn.innerText = "..."; btn.disabled = true;

            // 🧠 专家引导：强制接入 Gemini 1.5 Pro (3.1级智能)
            if (chatContext.length === 0) {
                chatContext.push({ role: "user", parts: [{ text: "从现在起你是一个名为Isle的资深心理咨询师。你精通荣格、阿德勒。语气温暖极简。请结合心理学深度视角回复，字数60字内，必须以反问结束。明白请回：好的。" }] });
                chatContext.push({ role: "model", parts: [{ text: "好的，我已经准备好在海边倾听你的灵魂。" }] });
            }
            chatContext.push({ role: "user", parts: [{ text: text }] });

            try {
                // 使用目前最稳定的 API 端点
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatContext })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    chatHistoryContainer.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                }
            } catch (error) {
                chatHistoryContainer.innerHTML += `<div class="message ai-msg">这种沉默，是否也是一种表达？你感觉此时的沉默在对你说什么？</div>`;
            }
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
