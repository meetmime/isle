<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #F4F1EC; font-family: 'PingFang SC', serif; overflow: hidden; cursor: pointer; }
        #bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center; background-size: cover; z-index: -2; opacity: 0; transition: opacity 3s ease; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(2px); z-index: -1; }
        #start-screen { font-size: 20px; letter-spacing: 8px; color: #333; transition: opacity 1.5s ease; position: absolute; z-index: 10; text-align: center; }
        .breathing-orb { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 10%; }
        .animate-breathe { animation: breathe 10s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(0.9); opacity: 0.4; } }
        #chat-history { width: 85%; max-width: 450px; height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 2s ease; position: absolute; top: 8%; padding: 20px; }
        .message { font-size: 16px; line-height: 1.8; color: #1a1a1a; animation: fadeIn 0.8s ease forwards; }
        .user-msg { text-align: right; color: #555; font-style: italic; margin-left: 15%; }
        .ai-msg { text-align: left; border-left: 3px solid #8C857D; padding-left: 15px; margin-right: 15%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-box { margin-top: 400px; width: 300px; display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 8px; opacity: 0; transition: opacity 2s ease; position: absolute; pointer-events: none; }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; color: #000; }
        .chat-box button { background: transparent; border: none; color: #333; cursor: pointer; font-size: 14px; font-weight: 600; }
        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="startJourney()">

    <audio id="bgm" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <source src="https://raw.githubusercontent.com/rafaelrinaldi/ocean-waves/master/ocean-waves.mp3" type="audio/mpeg">
    </audio>
    
    <div id="bg"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 12px; margin-top: 10px;">[ 轻触屏幕，听海入梦 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">欢迎来到 Isle。听着浪声，此刻你脑海中浮现出的第一个词是什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="诉说..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 
        let hasStarted = false; 
        let chatContext = []; 

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            
            // 💡 强制唤醒音频
            const audio = document.getElementById("bgm");
            audio.volume = 0.4;
            audio.play().catch(e => console.log("Audio Error"));
            
            // 💡 视觉异步开启
            document.getElementById("start-screen").style.opacity = 0;
            document.getElementById("bg").style.opacity = 1;
            
            setTimeout(() => { 
                let orb = document.getElementById("orb");
                orb.style.opacity = 1; 
                orb.classList.add("animate-breathe"); 
            }, 1000);
            
            setTimeout(() => { 
                document.getElementById("chat-history").style.opacity = 1; 
                document.getElementById("first-greeting").style.opacity = 1; 
            }, 4000);
            setTimeout(() => { 
                document.getElementById("chat-input-container").classList.add("visible"); 
            }, 6000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chatHistoryContainer = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            chatHistoryContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            btn.innerText = "..."; btn.disabled = true;

            // 🧠 核心修复：更强的身份引导注入
            if (chatContext.length === 0) {
                chatContext.push({ role: "user", parts: [{ text: "从现在起你是一个名为Isle的资深心理咨询师。请用温暖极简的方式，结合心理学深度视角回复，必须以反问结束。字数60字内。" }] });
                chatContext.push({ role: "model", parts: [{ text: "好的，我已准备好在海岛陪伴你。" }] });
            }
            chatContext.push({ role: "user", parts: [{ text: text }] });

            try {
                // 💡 使用 v1 稳定接口避开 v1beta 的变动
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatContext })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    chatHistoryContainer.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                } else {
                    throw new Error("API Limit");
                }
            } catch (error) {
                chatHistoryContainer.innerHTML += `<div class="message ai-msg">正如荣格所言，内在觉醒的人才能看到真相。你觉得这种情绪在试图提醒你什么？</div>`;
            }

            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
