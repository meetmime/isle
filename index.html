<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'PingFang SC', 'STHeiti', serif; color: #2C2C2C; overflow: hidden; cursor: pointer; background-color: #F4F1EC; }
        
        /* 🏝️ 极简海岛背景图 */
        #background-scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center;
            background-size: cover;
            z-index: -2;
            transition: transform 20s linear;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        #start-screen { font-size: 20px; letter-spacing: 8px; transition: opacity 1.5s ease; position: absolute; text-align: center; color: #333; font-weight: 300; }

        .breathing-orb { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 10%; }
        .animate-breathe { animation: breathe 10s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(0.9); opacity: 0.4; } }

        #chat-history { 
            width: 85%; max-width: 450px; height: 50vh; 
            margin-top: 30px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; top: 10%; padding: 20px;
        }

        .message { font-size: 16px; line-height: 1.8; animation: fadeIn 0.8s ease forwards; }
        .user-msg { text-align: right; color: #555; font-style: italic; }
        .ai-msg { text-align: left; color: #000; border-left: 3px solid #8C857D; padding-left: 15px; font-weight: 400; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-box { 
            margin-top: 400px; width: 300px; 
            display: flex; align-items: center; 
            border-bottom: 2px solid #333; padding-bottom: 8px; 
            opacity: 0; transition: opacity 2s ease; 
            position: absolute; pointer-events: none;
        }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; color: #000; font-size: 16px; }
        .chat-box button { background: transparent; border: none; color: #333; cursor: pointer; font-size: 14px; font-weight: 600; }

        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="startJourney()">

    <audio id="bgm" loop preload="auto">
        <source src="https://raw.githubusercontent.com/rafaelrinaldi/ocean-waves/master/ocean-waves.mp3" type="audio/mpeg">
    </audio>
    
    <div id="background-scene"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 12px; margin-top: 10px; letter-spacing: 2px;">[ 轻触屏幕 听海呼吸 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">欢迎登岛。在这个只属于你的时刻，你想放下些什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="诉说..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 
        let hasStarted = false; 
        let chatContext = []; 

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            
            const audio = document.getElementById("bgm");
            audio.play().catch(e => console.log("需再次交互播放音频"));
            
            document.getElementById("start-screen").style.opacity = 0;
            document.getElementById("background-scene").style.transform = "scale(1.2)";
            
            setTimeout(() => { 
                let orb = document.getElementById("orb");
                orb.style.opacity = 1; 
                orb.classList.add("animate-breathe"); 
            }, 1000);
            
            setTimeout(() => { 
                document.getElementById("chat-history").style.opacity = 1; 
                document.getElementById("first-greeting").style.opacity = 1; 
            }, 3000);
            setTimeout(() => { 
                document.getElementById("chat-input-container").classList.add("visible"); 
            }, 4500); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chatHistoryContainer = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            chatHistoryContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            btn.innerText = "..."; btn.disabled = true;

            // 🧠 核心修复：确保对话历史被正确累加
            chatContext.push({ role: "user", parts: [{ text: text }] });

            const systemPrompt = "你是一个名为Isle的资深心理咨询师，深度掌握阿德勒、荣格、弗兰克尔的理论。你现在正在一个静谧的海岛上引导用户。要求：1. 语气极简、智慧。2. 必须联系上下文回答，严禁重复之前的话。3. 每一句回复最后必须接一个深入灵魂的问题。4. 字数控制在60字内。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatContext,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    
                    // 🧠 核心修复：将 AI 的回复也存入历史
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    
                    chatHistoryContainer.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                }
            } catch (error) {
                chatHistoryContainer.innerHTML += `<div class="message ai-msg">这种沉默，是否也是一种表达？你感觉此时的沉默在对你说什么？</div>`;
            }

            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
