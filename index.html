<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'PingFang SC', serif; overflow: hidden; cursor: pointer; background: #000; }
        #bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80') no-repeat center center; background-size: cover; z-index: -2; transition: transform 20s linear; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(2px); z-index: -1; }
        #start-screen { font-size: 20px; letter-spacing: 10px; color: white; transition: opacity 2s ease; position: absolute; z-index: 10; text-align: center; }
        .breathing-orb { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 12%; }
        .animate-breathe { animation: breathe 12s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(0.9); opacity: 0.3; } }
        #chat-history { width: 85%; max-width: 450px; height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 2s ease; position: absolute; top: 8%; padding: 20px; }
        .message { font-size: 16px; line-height: 1.9; color: white; text-shadow: 0 1px 5px rgba(0,0,0,0.8); animation: fadeIn 0.8s ease forwards; }
        .user-msg { text-align: right; color: rgba(255,255,255,0.8); font-style: italic; }
        .ai-msg { text-align: left; border-left: 2px solid rgba(255,255,255,0.6); padding-left: 15px; }
        .chat-box { margin-top: 420px; width: 300px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.7); padding-bottom: 10px; opacity: 0; transition: opacity 2s ease; position: absolute; }
        .visible { opacity: 1 !important; pointer-events: auto !important; }
        input { background: transparent; border: none; outline: none; flex-grow: 1; font-size: 16px; color: white; font-family: inherit; }
        button { background: transparent; border: none; color: white; cursor: pointer; font-size: 14px; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="startJourney()">

    <div id="bg"></div>
    <div id="overlay"></div>
    
    <div id="start-screen">
        <p>Isle</p>
        <p style="font-size: 11px; margin-top: 20px; letter-spacing: 4px;">[ 轻触屏幕 唤醒海岛 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">欢迎来到 Isle。听着浪声，此刻你心中最真实的感受是什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="诉说..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        let USER_KEY = localStorage.getItem('ISLE_KEY'); 
        let hasStarted = false; 
        let chatContext = [];
        let audioCtx, noiseGain;

        // 🌊 沿用你认可的完美渐强海浪
        function playOceanSound() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioCtx.sampleRate,
                  buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                  output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 350;
            noiseGain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            noiseGain.gain.setValueAtTime(0.0001, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.12, now + 8); 
            noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start();
            function tide() {
                const t = audioCtx.currentTime;
                noiseGain.gain.exponentialRampToValueAtTime(0.16, t + 4);
                noiseGain.gain.exponentialRampToValueAtTime(0.06, t + 8);
                setTimeout(tide, 8000);
            }
            setTimeout(tide, 8000);
        }

        function startJourney() {
            if (hasStarted) return;
            
            // 如果本地没 Key，先提示输入，这样 GitHub 就抓不到你的 Key
            if (!USER_KEY) {
                const k = prompt("为了防止 Key 泄露被 Google 禁用，请粘贴你新申请的 API Key (仅保存在你的浏览器本地):");
                if (k) { localStorage.setItem('ISLE_KEY', k); USER_KEY = k; }
                else return;
            }

            hasStarted = true;
            playOceanSound();
            document.getElementById("start-screen").style.opacity = 0;
            document.getElementById("bg").style.transform = "scale(1.1)";
            setTimeout(() => { document.getElementById("orb").classList.add("visible", "animate-breathe"); }, 1000);
            setTimeout(() => { document.getElementById("chat-history").classList.add("visible"); document.getElementById("first-greeting").style.opacity = 1; }, 3000);
            setTimeout(() => { document.getElementById("chat-input-container").classList.add("visible"); }, 5000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;
            const container = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            container.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = ""; btn.innerText = "..."; btn.disabled = true;
            container.scrollTop = container.scrollHeight;

            if (chatContext.length === 0) {
                chatContext.push({ role: "user", parts: [{ text: "你是Isle，一位精通荣格和阿德勒的心理咨询师。语气极简温暖，字数60字内，必须反问结束。" }] });
            }
            chatContext.push({ role: "user", parts: [{ text: text }] });

            try {
                // 强行调用 1.5 Pro（这是目前最顶级的“Pro”大脑）
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${USER_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatContext })
                });
                const data = await response.json();
                if (data.candidates) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    chatContext.push({ role: "model", parts: [{ text: aiReply }] });
                    container.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                } else {
                    container.innerHTML += `<div class="message ai-msg" style="color:#ffb3b3;">[Isle 核心未响应：${data.error.message}]</div>`;
                    if (data.error.message.includes("API_KEY_INVALID")) localStorage.removeItem('ISLE_KEY');
                }
            } catch (error) {
                container.innerHTML += `<div class="message ai-msg" style="color:#ffb3b3;">[连接受阻，请确保能直连 Google 服务]</div>`;
            }
            container.scrollTop = container.scrollHeight;
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
