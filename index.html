<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        /* 🎨 核心视觉：淡雅、禅意 */
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #F0EBE3; font-family: 'Georgia', serif; color: #5C5853; overflow: hidden; cursor: pointer; transition: background 2s ease; }
        
        /* 📱 极简海岛背景 */
        body::before { content: ""; position: absolute; bottom: 0; width: 100%; height: 40vh; background: linear-gradient(to top, #D8D0C3 0%, rgba(216, 208, 195, 0) 100%); z-index: -1; opacity: 0.5; }
        #island-scene { position: absolute; bottom: 10vh; width: 200px; height: 100px; background: #D0C8BD; border-radius: 50% 50% 0 0; opacity: 0; transition: opacity 3s ease; z-index: -1; }
        #island-scene::after { content: "🌴"; position: absolute; top: -30px; left: 85px; font-size: 30px; opacity: 0.7; }

        #start-screen { font-size: 16px; letter-spacing: 4px; transition: opacity 2s ease; position: absolute; text-align: center; color: #8C857D; }
        
        /* 🌊 有呼吸感的海岛光晕 */
        .breathing-orb { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #E1D9D1 0%, rgba(225, 217, 209, 0) 80%); box-shadow: 0 0 50px 25px rgba(225, 217, 209, 0.3); opacity: 0; transition: opacity 4s ease; position: absolute; top: 15%; }
        .animate-breathe { animation: breathe 12s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.5; } }
        
        #chat-history { width: 90%; max-width: 500px; height: 55vh; margin-top: 50px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 2s ease; position: absolute; top: 5%; padding: 20px; scroll-behavior: smooth; }
        .message { font-size: 15px; line-height: 1.9; letter-spacing: 1px; animation: fadeIn 1s ease forwards; }
        .user-msg { text-align: right; color: #8C857D; margin-left: 15%; font-style: italic; }
        .ai-msg { text-align: left; color: #5C5853; margin-right: 10%; border-left: 1px solid #D5D0C8; padding-left: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-box { margin-top: 420px; width: 320px; display: flex; align-items: center; border-bottom: 1px solid #D5D0C8; padding-bottom: 8px; opacity: 0; transition: opacity 2s ease; position: absolute; pointer-events: none; }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-family: 'Georgia', serif; color: #5C5853; font-size: 15px; }
        .chat-box button { background: transparent; border: none; color: #8C857D; cursor: pointer; font-size: 13px; letter-spacing: 2px; }
        
        /* 滚动条美化 */
        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-thumb { background-color: #D5D0C8; border-radius: 2px; }
    </style>
</head>
<body onclick="startJourney()">

    <audio id="bgm" loop><source src="https://assets.mixkit.co/active_storage/sfx/2890/2890-preview.mp3" type="audio/mpeg"></audio>
    
    <div id="start-screen">
        <p>欢迎来到 Isle</p>
        <p style="font-size: 12px; letter-spacing: 2px; margin-top: 10px;">轻触屏幕，听海</p>
    </div>
    
    <div id="island-scene"></div>
    <div class="breathing-orb" id="orb"></div>
    
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">在这一刻，抛开所有的社会身份，你的灵魂感受到了什么？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="深呼吸，写下你的思绪..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>

    <script>
        // 🚨 你的 API KEY 已经在此
        const API_KEY = 'AIzaSyDNxFYaam0j03Q4bwnlQBUwQTQtl9FmK7Y'; 

        let hasStarted = false; 
        let history = [];

        function startJourney() {
            if (hasStarted) return; 
            hasStarted = true;
            
            // 听海
            document.getElementById("bgm").play().catch(()=>{console.log("音频播放需用户交互")});
            
            // 视觉浮现
            document.getElementById("start-screen").style.opacity = 0;
            setTimeout(() => { 
                document.getElementById("island-scene").style.opacity = 1;
                let orb = document.getElementById("orb");
                orb.style.opacity = 1; 
                orb.classList.add("animate-breathe"); 
            }, 1000);
            
            // 对话浮现 (稍微推迟，留出听海时间)
            setTimeout(() => { 
                document.getElementById("chat-history").style.opacity = 1; 
                document.getElementById("first-greeting").style.opacity = 1; 
            }, 12000);
            setTimeout(() => { 
                document.getElementById("chat-input-container").classList.add("visible"); 
            }, 14000); 
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chatHistory = document.getElementById("chat-history");
            const btn = document.getElementById("send-btn");

            chatHistory.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            btn.innerText = "溯源..."; btn.disabled = true;

            // 🧠 深度心理学 Prompt：阿德勒、荣格、弗兰克尔。回复限制在两句，必须有反问。
            const sysPrompt = "你是一个名为Isle的资深心理分析师。你熟读荣格、阿德勒和弗兰克尔。回复要求：1. 温暖且极简。2. 必须结合心理学深度视角。3. 每一句回复最后必须接一个关于‘内在探索’的反问。回复不得超过60字。";

            history.push({ role: "user", parts: [{ text: text }] });

            try {
                // 调用 Gemini 1.5 Pro 最新稳定版
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history, systemInstruction: { parts: [{ text: sysPrompt }] } })
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const aiReply = data.candidates[0].content.parts[0].text;
                
                history.push({ role: "model", parts: [{ text: aiReply }] });
                chatHistory.innerHTML += `<div class="message ai-msg">${aiReply}</div>`;
                chatHistory.scrollTop = chatHistory.scrollHeight; 

            } catch (error) {
                // 如果请求失败，使用深度后备方案
                chatHistory.innerHTML += `<div class="message ai-msg">荣格曾言：'内在觉醒的人，才能看到真相。' 你觉得这种情绪在试图告诉你什么真相？</div>`;
                conversationHistory.pop();
            }
            btn.innerText = "深入"; btn.disabled = false;
        }
    </script>
</body>
</html>
