<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isle - 你的心理愈疗小岛</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #F4F1EC; font-family: 'Georgia', serif; color: #5C5853; overflow: hidden; cursor: pointer; }
        
        /* 🏝️ 极简海岛：淡雅的雾感渐变 */
        #island-view { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 30%, #EBE6DE 0%, #F4F1EC 70%); z-index: -1; }
        
        #start-screen { font-size: 16px; letter-spacing: 5px; transition: opacity 2s ease; position: absolute; text-align: center; color: #9A938A; }

        /* 🌊 呼吸的光晕：模拟海浪起伏 */
        .breathing-orb { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, #E1D9D1 0%, rgba(225, 217, 209, 0) 75%); opacity: 0; transition: opacity 4s ease; position: absolute; top: 15%; }
        .animate-breathe { animation: breathe 12s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(0.85); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(0.85); opacity: 0.4; } }

        #chat-history { width: 85%; max-width: 480px; height: 50vh; margin-top: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; opacity: 0; transition: opacity 2s ease; position: absolute; top: 8%; padding: 10px; }
        .message { font-size: 15px; line-height: 2; letter-spacing: 1.5px; animation: fadeIn 1.2s ease forwards; }
        .user-msg { text-align: right; color: #8C857D; font-style: italic; margin-left: 20%; }
        .ai-msg { text-align: left; color: #5C5853; margin-right: 15%; border-left: 1px solid #D5D0C8; padding-left: 18px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .chat-box { margin-top: 400px; width: 300px; display: flex; align-items: center; border-bottom: 1px solid #D5D0C8; padding-bottom: 10px; opacity: 0; transition: opacity 2s ease; position: absolute; pointer-events: none; }
        .chat-box.visible { opacity: 1; pointer-events: auto; }
        .chat-box input { background: transparent; border: none; outline: none; flex-grow: 1; font-family: 'Georgia', serif; color: #5C5853; font-size: 15px; }
        .chat-box button { background: transparent; border: none; color: #9A938A; cursor: pointer; font-size: 13px; letter-spacing: 3px; }

        /* 隐藏滚动条 */
        #chat-history::-webkit-scrollbar { display: none; }
    </style>
</head>

        <p>Isle</p>
        <p style="font-size: 11px; margin-top: 20px;">[ 轻触屏幕 听海开启 ]</p>
    </div>
    
    <div class="breathing-orb" id="orb"></div>
    
    <div id="chat-history">
        <div class="message ai-msg" id="first-greeting" style="opacity: 0;">在这个远离喧嚣的海岛，此刻你的内心回响着什么样的声音？</div>
    </div>
    
    <div class="chat-box" id="chat-input-container">
        <input type="text" id="user-input" placeholder="将思绪交给大海..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="send-btn">深入</button>
    </div>
